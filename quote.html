<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Request a Quote | CMJ Marine</title>

<style>
:root{
  --dark:#050b12;
  --gold:#d6a84f;
  --white:#ffffff;
  --soft:#d8e3ee;
  --muted:#8fa3b8;
}

*{box-sizing:border-box}

body{
  margin:0;
  background:var(--dark);
  color:var(--white);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:30px 6vw;
}

.brand img{
  width:175px;
  display:block;
}

.back{
  color:white;
  text-decoration:none;
  font-size:12px;
  font-weight:900;
  letter-spacing:.14em;
  text-transform:uppercase;
  border:1px solid rgba(255,255,255,.45);
  padding:15px 22px;
}

.page{
  padding:80px 6vw 110px;
  max-width:980px;
  margin:auto;
}

.eyebrow{
  color:var(--gold);
  font-size:14px;
  font-weight:900;
  letter-spacing:.34em;
  text-transform:uppercase;
  margin-bottom:24px;
}

h1{
  margin:0 0 28px;
  font-size:clamp(54px,8vw,110px);
  line-height:.9;
  letter-spacing:-.06em;
  text-transform:uppercase;
}

.intro{
  color:var(--soft);
  font-size:22px;
  line-height:1.5;
  max-width:700px;
  margin:0 0 56px;
}

form{
  display:grid;
  gap:22px;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:22px;
}

label{
  display:block;
  color:var(--muted);
  font-size:12px;
  font-weight:900;
  letter-spacing:.14em;
  text-transform:uppercase;
  margin-bottom:10px;
}

input,
select,
textarea{
  width:100%;
  background:#0d1a29;
  border:1px solid rgba(255,255,255,.16);
  color:white;
  padding:18px;
  font-size:17px;
  font-family:inherit;
}

textarea{
  min-height:180px;
  resize:vertical;
}

button{
  margin-top:18px;
  background:var(--gold);
  color:#06111d;
  border:0;
  padding:22px 34px;
  font-size:13px;
  font-weight:900;
  letter-spacing:.16em;
  text-transform:uppercase;
  cursor:pointer;
}

.note{
  color:var(--muted);
  font-size:15px;
  line-height:1.5;
  margin-top:18px;
}

@media(max-width:800px){
  .header{
    padding:26px 24px;
  }

  .brand img{
    width:155px;
  }

  .back{
    padding:13px 16px;
    font-size:11px;
  }

  .page{
    padding:60px 24px 90px;
  }

  .row{
    grid-template-columns:1fr;
  }

  .intro{
    font-size:20px;
  }

  button{
    width:100%;
  }
}
</style>
</head>

<body>

<header class="header">
  <a class="brand" href="/">
    <img src="originallogo.PNG" alt="CMJ Marine">
  </a>

  <a class="back" href="/">Back Home</a>
</header>

<main class="page">
  <div class="eyebrow">Request a Quote</div>

  <h1>Start Your Project</h1>

  <p class="intro">
    Tell us about your upholstery project, OEM production needs, captain chairs, cooler cushions, or custom marine seating.
  </p>

  <form action="https://formspree.io/f/xpqgydne" method="POST">

    <div class="row">
      <div>
        <label for="project-type">Project Type</label>
        <select id="project-type" name="Project Type" required>
          <option value="">Select one</option>
          <option>OEM Production</option>
          <option>Captain Chairs</option>
          <option>Marine Upholstery</option>
          <option>Cooler Cushions</option>
          <option>Custom Project</option>
          <option>Other</option>
        </select>
      </div>

      <div>
        <label for="company">Company</label>
        <input id="company" name="Company" type="text" placeholder="Optional">
      </div>
    </div>

    <div class="row">
      <div>
        <label for="name">Name</label>
        <input id="name" name="Name" type="text" required>
      </div>

      <div>
        <label for="email">Email</label>
        <input id="email" name="Email" type="email" required>
      </div>
    </div>

    <div class="row">
      <div>
        <label for="phone">Phone</label>
        <input id="phone" name="Phone" type="tel">
      </div>

      <div>
        <label for="boat">Boat Make / Model</label>
        <input id="boat" name="Boat Make / Model" type="text" placeholder="Example: Costa 26">
      </div>
    </div>

    <div>
      <label for="message">Project Details</label>
      <textarea id="message" name="Project Details" required placeholder="Tell us what you need built, repaired, replaced, or quoted."></textarea>
    </div>

    <div>
      <label for="photos">Photo Links</label>
      <input id="photos" name="Photo Links" type="text" placeholder="Paste Google Drive, iCloud, or Dropbox links if available">
    </div>

    <button type="submit">Submit Quote Request</button>

    <p class="note">
      Photos help us quote accurately. Direct photo uploads can be added later if needed.
    </p>

  </form>
</main>

</body>
</html>
