<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CMJ Marine | OEM Marine Upholstery Specialists</title>

<style>
:root{
  --dark:#050b12;
  --gold:#d6a84f;
  --white:#ffffff;
  --soft:#d8e3ee;
}

*{box-sizing:border-box}

body{
  margin:0;
  background:var(--dark);
  color:var(--white);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
}

.hero{
  min-height:100vh;
  display:flex;
  align-items:center;
  background:
    linear-gradient(90deg,
      rgba(5,10,18,.94) 0%,
      rgba(5,10,18,.82) 34%,
      rgba(5,10,18,.42) 58%,
      rgba(5,10,18,.12) 100%
    ),
    url("hero-blue-leaning-post.PNG") 78% center / cover no-repeat;
}

.header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:10;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:28px 6vw;
}

.logo img{
  width:170px;
  display:block;
}

.nav{
  display:flex;
  gap:28px;
  align-items:center;
}

.nav a{
  color:white;
  text-decoration:none;
  font-size:12px;
  font-weight:800;
  letter-spacing:.12em;
  text-transform:uppercase;
}

.quote{
  border:1px solid rgba(255,255,255,.45);
  padding:16px 24px;
}

.content{
  max-width:720px;
  padding:150px 6vw 90px;
}

.kicker{
  color:var(--gold);
  font-size:14px;
  font-weight:900;
  letter-spacing:.32em;
  text-transform:uppercase;
  margin-bottom:24px;
}

h1{
  margin:0 0 30px;
  font-size:clamp(58px,8vw,112px);
  line-height:.88;
  letter-spacing:-.06em;
  text-transform:uppercase;
}

p{
  max-width:560px;
  color:var(--soft);
  font-size:clamp(20px,2vw,24px);
  line-height:1.5;
  margin:0 0 40px;
}

.buttons{
  display:flex;
  gap:16px;
  flex-wrap:wrap;
}

.btn{
  display:inline-block;
  padding:22px 34px;
  color:white;
  text-decoration:none;
  border:1px solid rgba(255,255,255,.42);
  font-size:12px;
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:.12em;
}

.btn.primary{
  background:var(--gold);
  color:#06111d;
  border-color:var(--gold);
}

@media(max-width:900px){
  .hero{
    align-items:flex-start;
    background:
      linear-gradient(180deg,
        rgba(5,10,18,.96) 0%,
        rgba(5,10,18,.72) 42%,
        rgba(5,10,18,.96) 100%
      ),
      url("hero-blue-leaning-post.PNG") 76% center / cover no-repeat;
  }

  .header{
    padding:24px;
  }

  .logo img{
    width:140px;
  }

  .nav a:not(.quote){
    display:none;
  }

  .quote{
    padding:14px 18px;
    font-size:11px;
  }

  .content{
    padding:165px 24px 80px;
  }

  h1{
    font-size:clamp(56px,15vw,86px);
  }

  .btn{
    width:100%;
    text-align:center;
  }
}
</style>
</head>

<body>

<header class="header">
  <a class="logo" href="/">
    <img src="CMJ-logo.PNG" alt="CMJ Marine">
  </a>

  <nav class="nav">
    <a href="#oem">OEM</a>
    <a href="#products">Products</a>
    <a href="#gallery">Gallery</a>
    <a href="#about">About</a>
    <a class="quote" href="mailto:info@cmjmarine.com">Request Quote</a>
  </nav>
</header>

<section class="hero">
  <div class="content">
    <div class="kicker">OEM Marine Upholstery Specialists</div>

    <h1>OEM<br>Marine<br>Upholstery</h1>

    <p>
      Premium OEM upholstery systems engineered for manufacturers and discerning boat owners.
    </p>

    <div class="buttons">
      <a class="btn primary" href="mailto:info@cmjmarine.com">Request a Quote</a>
      <a class="btn" href="#gallery">View Our Work</a>
    </div>
  </div>
</section>

</body>
</html>
